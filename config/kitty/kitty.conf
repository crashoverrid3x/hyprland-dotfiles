# --- Fuentes (Hack Nerd Font) ---
font_family      Hack Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# --- Apariencia 42 Style ---
background            #1e1e2e
foreground            #cdd6f4
background_opacity     0.92
window_padding_width   10
cursor_shape          block
shell_integration     no-cursor

# --- Portapapeles Principal (Estilo MacOS/65%) ---
map alt+c copy_to_clipboard
map alt+v paste_from_clipboard

# Desactivar los originales de Linux para evitar líos
map ctrl+shift+c no_op
map ctrl+shift+v no_op

# --- Triple Buffer (Múltiples Clipboards) ---
# Fila de números para GUARDAR (Alt + 1, 2, 3)
map alt+1 copy_to_buffer a
map alt+2 copy_to_buffer b
map alt+3 copy_to_buffer c

# Fila QWE para PEGAR (Alt + Q, W, E)
map alt+q paste_from_buffer a
map alt+w paste_from_buffer b
map alt+e paste_from_buffer c

# --- Navegación y Gestión de Ventanas (65% Optimized) ---
map alt+enter new_window_with_cwd
map alt+t     new_tab_with_cwd
map ctrl+shift+w     close_window
# Moverse entre paneles con Alt + Flechas
map alt+left  neighboring_window left
map alt+right neighboring_window right
map alt+up    neighboring_window up
map alt+down  neighboring_window down

# --- Comportamiento ---
copy_on_select yes
enable_audio_bell no
confirm_os_window_close 0

# Recargar configuración con Alt + R
map alt+r load_config_file
