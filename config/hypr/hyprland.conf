################################################################################
# HYPRLAND CONFIG
################################################################################

################
### MONITORS ###
################

monitor=eDP-1,2880x1800@120,0x0,1.5
monitor=DP-3,3840x2160@60,1920x0,1.33

###################
### AUTOSTART ###
###################

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

exec-once = waybar
exec-once = hyprctl setcursor Bibata-Modern-Ice 25
exec-once = swaybg -i /home/zerocool/wallpapers/chill-lofi.jpg -m fill

### Layout
input {
    kb_layout = us,es
}

###################
### PROGRAMS ###
###################

$terminal = kitty
$fileManager = dolphin
$menu = hyprlauncher
$browser = firefox
$spider1 = burpsuite
$spider2 = caido
$keepass = keepassxc
$rofi = rofi -show drun
$switch = bash ~/scripts/switch_sink.sh

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,0
env = QT_QPA_PLATFORMTHEME,qt6ct

env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = MOZ_ENABLE_WAYLAND,1

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 20
    border_size = 0

    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    resize_on_border = false
    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 0.9

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        passes = 1
        vibrancy = 0.1696
    }
}

animations {
    enabled = yes

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = quick,0.15,0,0.1,1

    animation = windows,1,4,easeOutQuint
    animation = windowsIn,1,4,easeOutQuint,popin 80%
    animation = windowsOut,1,2,linear,popin 80%
    animation = fade,1,3,quick
    animation = workspaces,1,2,quick
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = false
}

#############
### INPUT ###
#############

input {
    kb_layout = us,es

    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
    }
}

gesture = 3, horizontal, workspace

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

# Terminal
bind = $mainMod, Return, exec, $terminal

# Close window
bind = $mainMod, Q, killactive

# Exit hyprland
bind = $mainMod, M, exec, hyprctl dispatch exit

# Apps
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, F, exec, $browser
bind = $mainMod, B, exec, $spider1
bind = $mainMod, C, exec, $spider2
bind = $mainMod, K, exec, $keepass
bind = $mainMod, SPACE, exec, hyprctl switchxkblayout current next

# Floating
bind = $mainMod, V, togglefloating

# Launcher
bind = $mainMod, R, exec, $menu
bind = $mainMod, D, exec, $rofi

# Screenshot
bind = ,Print, exec, hyprshot -m region --clipboard-only

# Switch audio sink
bind = $mainMod, A, exec, $switch

###############
# BRIGHTNESS
###############

bind = ,XF86MonBrightnessDown, exec, brightnessctl set 5%-
bind = ,XF86MonBrightnessUp, exec, brightnessctl set +5%

bind = ,F2, exec, brightnessctl set 5%-
bind = ,F3, exec, brightnessctl set +5%

###############
# AUDIO
###############

bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-

###############
# MEDIA
###############

bind = ,XF86AudioNext, exec, playerctl next
bind = ,XF86AudioPrev, exec, playerctl previous
bind = ,XF86AudioPlay, exec, playerctl play-pause
bind = ,XF86AudioPause, exec, playerctl play-pause

###############
# MOVE FOCUS
###############

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

###############
# WORKSPACES
###############

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

bind = $mainMod SHIFT,1,movetoworkspace,1
bind = $mainMod SHIFT,2,movetoworkspace,2
bind = $mainMod SHIFT,3,movetoworkspace,3
bind = $mainMod SHIFT,4,movetoworkspace,4
bind = $mainMod SHIFT,5,movetoworkspace,5

###############
# SPECIAL WS
###############

bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

###############
# MOUSE
###############

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

###############
# XWAYLAND
###############

xwayland {
  force_zero_scaling = true
}
